name: Production Browser Synthetic

on:
  schedule:
    - cron: "30 4,10,16,22 * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  browser-synthetic:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Run production browser synthetic checks
        env:
          PROD_BASE: https://www.binary2048.com
        run: npm run ops:prod:browser
