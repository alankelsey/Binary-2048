name: Production Smoke

on:
  schedule:
    # 4 checks/day in UTC:
    # 04:00, 10:00, 16:00, 22:00
    # Boise roughly maps to 2 daytime + 2 nighttime checks.
    - cron: "0 4,10,16,22 * * *"
  workflow_dispatch:

permissions:
  contents: read
  actions: read
  issues: write

jobs:
  prod-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run production smoke checks
        env:
          PROD_BASE: https://www.binary2048.com
        run: bash ./scripts/prod-smoke.sh

      - name: Evaluate repeated failure rollback trigger
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const workflow_id = context.workflow;
            const currentRunId = context.runId;

            const runsResp = await github.rest.actions.listWorkflowRuns({
              owner,
              repo,
              workflow_id,
              branch: "main",
              status: "completed",
              per_page: 10
            });

            const runs = runsResp.data.workflow_runs
              .filter(r => r.id !== currentRunId)
              .sort((a, b) => new Date(b.created_at) - new Date(a.created_at));

            const previous = runs[0];
            const repeatedFailure = previous && previous.conclusion === "failure";

            core.info(`current run failed; previous conclusion=${previous?.conclusion ?? "none"}`);
            if (!repeatedFailure) {
              core.info("Rollback trigger not met (need at least 2 consecutive failures).");
              return;
            }

            const title = "Prod smoke failed in consecutive runs (rollback candidate)";
            const body = [
              "Automated policy trigger: production smoke checks failed in two consecutive runs.",
              "",
              `- current run: ${context.serverUrl}/${owner}/${repo}/actions/runs/${currentRunId}`,
              `- previous run: ${context.serverUrl}/${owner}/${repo}/actions/runs/${previous.id}`,
              "",
              "Recommended immediate actions:",
              "1. Run npm run ops:incident:bundle",
              "2. Review Amplify deployment and CloudWatch logs",
              "3. Consider rollback or emergency degrade mode per runbook"
            ].join("\n");

            const issuesResp = await github.rest.issues.listForRepo({
              owner,
              repo,
              state: "open",
              per_page: 100
            });
            const existing = issuesResp.data.find(i => i.title === title);

            if (existing) {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: existing.number,
                body
              });
              core.info(`Updated existing issue #${existing.number}`);
              return;
            }

            const created = await github.rest.issues.create({
              owner,
              repo,
              title,
              body,
              labels: ["incident", "ops", "rollback-candidate"]
            });
            core.info(`Created issue #${created.data.number}`);
