name: Amplify Deploy Watch

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  watch-amplify-main:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select AWS auth mode
        id: auth-mode
        shell: bash
        env:
          AWS_ROLE_TO_ASSUME: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        run: |
          set -euo pipefail
          if [ -n "${AWS_ROLE_TO_ASSUME:-}" ]; then
            echo "mode=oidc" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [ -n "${AWS_ACCESS_KEY_ID:-}" ] && [ -n "${AWS_SECRET_ACCESS_KEY:-}" ]; then
            echo "mode=static" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "::error::Missing AWS GitHub Actions auth configuration."
          echo "::error::Set either AWS_ROLE_TO_ASSUME for OIDC, or both AWS_ACCESS_KEY_ID and AWS_SECRET_ACCESS_KEY as repository secrets."
          exit 1

      - name: Configure AWS credentials via OIDC
        if: steps.auth-mode.outputs.mode == 'oidc'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: us-east-2

      - name: Configure AWS credentials via static access key
        if: steps.auth-mode.outputs.mode == 'static'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-2

      - name: Watch latest Amplify deployment for main
        id: watch
        env:
          APP_ID: dzxvs1esr22z9
          BRANCH_NAME: main
          AWS_REGION: us-east-2
          TIMEOUT_SECONDS: 1200
          POLL_SECONDS: 15
        run: npm run ops:amplify:watch

      - name: Post-deploy production verification gate
        env:
          PROD_BASE: https://www.binary2048.com
          PROD_VERIFY_ATTEMPTS: 20
          PROD_VERIFY_SLEEP_SECONDS: 20
        run: npm run ops:prod:verify

      - name: Verify Amplify service role SSM access
        env:
          APP_ID: dzxvs1esr22z9
          AWS_REGION: us-east-2
        run: npm run ops:iam:amplify-ssm-check

      - name: Release auth/session verification
        env:
          PROD_BASE: https://www.binary2048.com
          EXPECT_PROVIDER: github
        run: npm run ops:release:auth-check

      - name: Collect prod digest fingerprints
        env:
          PROD_BASE: https://www.binary2048.com
          AMPLIFY_JOB_ID: ${{ steps.watch.outputs.job_id }}
          AMPLIFY_COMMIT_ID: ${{ steps.watch.outputs.commit_id }}
          PROD_FINGERPRINT_ARTIFACT_DIR: artifacts
        run: npm run ops:prod:fingerprints

      - name: Upload prod digest artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: prod-digest-fingerprints
          path: artifacts/prod-digest-fingerprints-*.json
          if-no-files-found: warn
